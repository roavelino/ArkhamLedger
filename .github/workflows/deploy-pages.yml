name: Deploy Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Inject runtime config into HTML
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail

          URL="${SUPABASE_URL:-}"
          PUB_KEY="${SUPABASE_PUBLISHABLE_KEY:-}"

          if [ -z "$URL" ] || [ -z "$PUB_KEY" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_PUBLISHABLE_KEY GitHub variables."
            exit 1
          fi

          sed -i "s|__SUPABASE_URL__|$URL|g" index.html login.html
          sed -i "s|__SUPABASE_PUBLISHABLE_KEY__|$PUB_KEY|g" index.html login.html

      - name: TypeScript check
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Prepare Pages artifact
        run: |
          set -euo pipefail
          mkdir -p dist
          cp index.html dist/index.html
          cp login.html dist/login.html
          cp -r src dist/src

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
