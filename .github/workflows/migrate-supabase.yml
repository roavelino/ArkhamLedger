name: Supabase SQL Migration

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/database/migrations.sql'
      - '.github/workflows/migrate-supabase.yml'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify psql
        run: psql --version

      - name: Run migration against Supabase Postgres
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          test -n "$SUPABASE_DB_URL"
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f src/database/migrations.sql
