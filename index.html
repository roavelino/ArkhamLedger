<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="supabase-url" content="__SUPABASE_URL__" />
  <meta name="supabase-publishable-key" content="__SUPABASE_PUBLISHABLE_KEY__" />
  <title>Arkham Ledger | Gerenciador de Fichas CoC</title>
  <style>
    :root{
      --bg:#44100d;
      --bg2:#171511;
      --panel:#1f1b16;
      --panel2:#262019;
      --line:#5d4d35;
      --soft:#8e7754;
      --text:#eadfc8;
      --muted:#b8a98b;
      --accent:#c3a76c;
      --accent2:#8b6c35;
      --danger:#a85347;
      --ok:#638a58;
      --shadow:0 10px 30px rgba(0,0,0,.35);
      --radius:14px;
      --radius-sm:10px;
      --paper:#2a241c;
      --roll-regular:#b08f57;
      --roll-hard:#8a6f44;
      --roll-extreme:#69502d;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: Georgia, "Times New Roman", serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(195,167,108,.07), transparent 28%),
        radial-gradient(circle at bottom right, rgba(195,167,108,.05), transparent 25%),
        linear-gradient(180deg, #100f0d 0%, #13110e 100%);
      overflow:auto;
    }

    .app{
      display:grid;
      grid-template-columns: 320px 1fr;
      min-height:100vh;
    }

    .sidebar{
      border-right:1px solid rgba(195,167,108,.18);
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), transparent),
        linear-gradient(180deg, #16130f, #120f0c);
      display:flex;
      flex-direction:column;
      min-width:0;
    }

    .brand{
      padding:18px 18px 14px;
      border-bottom:1px solid rgba(195,167,108,.14);
    }

    .brand h1{
      margin:0;
      font-size:22px;
      letter-spacing:.06em;
      color:var(--accent);
      text-transform:uppercase;
    }

    .brand .sub{
      color:var(--muted);
      font-size:12px;
      margin-top:4px;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .sidebar-controls{
      padding:14px;
      display:grid;
      gap:10px;
      border-bottom:1px solid rgba(195,167,108,.12);
    }

    .row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .btn, button{
      border:none;
      border-radius:10px;
      padding:10px 12px;
      font-size:13px;
      cursor:pointer;
      color:var(--text);
      background:linear-gradient(180deg, #3b3022, #2e261c);
      border:1px solid rgba(195,167,108,.18);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
    }

    .btn:hover, button:hover{filter:brightness(1.08)}
    .btn.secondary{background:linear-gradient(180deg,#2c2720,#211d18)}
    .btn.ghost{background:rgba(255,255,255,.03)}
    .btn.danger{background:linear-gradient(180deg,#5d2c27,#48231f); border-color:rgba(168,83,71,.35)}
    .btn.ok{background:linear-gradient(180deg,#314630,#223123); border-color:rgba(99,138,88,.35)}

    input, select, textarea{
      width:100%;
      border-radius:10px;
      border:1px solid rgba(195,167,108,.16);
      background:#181511;
      color:var(--text);
      padding:10px 11px;
      font:inherit;
      outline:none;
    }
    .lang-select{
      min-width:88px;
    }
    input:focus, select:focus, textarea:focus{
      border-color:rgba(195,167,108,.45);
      box-shadow:0 0 0 3px rgba(195,167,108,.08);
    }
    textarea{min-height:90px; resize:vertical}

    .search{padding:0 14px 12px}
    .sheet-list{
      padding:10px;
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap:8px;
      min-height:0;
    }

    .sheet-item{
      background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
      border:1px solid rgba(195,167,108,.12);
      border-radius:12px;
      padding:12px;
      cursor:pointer;
      transition:.16s ease;
    }
    .sheet-item:hover{transform:translateY(-1px); border-color:rgba(195,167,108,.28)}
    .sheet-item.active{
      background:linear-gradient(180deg, rgba(195,167,108,.13), rgba(195,167,108,.04));
      border-color:rgba(195,167,108,.38);
      box-shadow: var(--shadow);
    }
    .sheet-item .title{
      font-weight:700;
      margin-bottom:4px;
      color:#f0e2c1;
    }
    .sheet-item .meta{
      color:var(--muted);
      font-size:12px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .main{
      display:flex;
      flex-direction:column;
      min-width:0;
      min-height:0;
    }

    .toolbar{
      padding:12px 16px;
      border-bottom:1px solid rgba(195,167,108,.14);
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      background:linear-gradient(180deg, rgba(255,255,255,.02), transparent);
    }

    .view-root{
      flex:1;
      min-height:0;
      overflow:auto;
      padding:18px;
    }

    .grid-view{
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(520px, 1fr));
      gap:18px;
      align-items:start;
    }

    .focus-view{
      display:flex;
      justify-content:center;
    }

    .sheet-card{
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
        linear-gradient(180deg, #221d16, #1a1611);
      border:1px solid rgba(195,167,108,.15);
      border-radius:18px;
      box-shadow:var(--shadow);
      overflow:hidden;
      min-width:0;
    }
    .focus-view .sheet-card{
      width:min(1200px, 100%);
    }

    .card-header{
      padding:18px;
      border-bottom:1px solid rgba(195,167,108,.15);
      background:
        radial-gradient(circle at top right, rgba(195,167,108,.08), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,.02), transparent);
    }

    .card-header h2{
      margin:0;
      font-size:28px;
      color:#f2e5c8;
      letter-spacing:.03em;
    }
    .card-header .subtitle{
      margin-top:6px;
      color:var(--muted);
      font-size:13px;
      text-transform:uppercase;
      letter-spacing:.08em;
    }

    .sheet-body{
      padding:18px;
      display:grid;
      gap:16px;
    }

    .section{
      background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
      border:1px solid rgba(195,167,108,.1);
      border-radius:16px;
      padding:14px;
    }

    .section h3{
      margin:0 0 12px;
      color:var(--accent);
      font-size:15px;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .grid-2{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px}
    .grid-3{display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px}
    .grid-4{display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px}
    .grid-6{display:grid; grid-template-columns:repeat(6,minmax(0,1fr)); gap:10px}
    .grid-8{display:grid; grid-template-columns:repeat(8,minmax(0,1fr)); gap:10px}
    .portrait-panel{
      display:grid;
      grid-template-columns:180px 1fr;
      gap:14px;
      align-items:start;
      margin-bottom:14px;
    }
    .portrait-preview{
      width:180px;
      aspect-ratio:3/4;
      border-radius:14px;
      border:1px solid rgba(195,167,108,.16);
      overflow:hidden;
      background:linear-gradient(180deg,#17130f,#0f0d0a);
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      font-size:13px;
      text-align:center;
      padding:12px;
    }
    .portrait-preview img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .portrait-actions{
      display:grid;
      gap:10px;
      align-content:start;
    }
    .helper{
      color:var(--muted);
      font-size:12px;
      line-height:1.5;
    }

    .field label{
      display:block;
      font-size:11px;
      color:var(--muted);
      margin-bottom:5px;
      text-transform:uppercase;
      letter-spacing:.08em;
    }

    .stat{
      background:rgba(255,255,255,.02);
      border:1px solid rgba(195,167,108,.1);
      border-radius:12px;
      padding:10px;
    }
    .stat-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:8px;
    }
    .stat-head strong{
      font-size:12px;
      color:var(--accent);
      letter-spacing:.08em;
    }
    .pill{
      font-size:11px;
      color:var(--muted);
      background:rgba(255,255,255,.03);
      border:1px solid rgba(195,167,108,.12);
      border-radius:999px;
      padding:2px 7px;
    }

    .triplet{
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap:6px;
      margin-top:6px;
    }
    .triplet div{
      text-align:center;
      padding:7px 4px;
      border-radius:8px;
      font-size:12px;
      border:1px solid rgba(195,167,108,.08);
      background:rgba(255,255,255,.02);
    }

    .skill-toolbar{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .skills{
      display:grid;
      gap:8px;
    }

    .skill-group{
      border:1px solid rgba(195,167,108,.08);
      border-radius:12px;
      overflow:hidden;
      background:rgba(255,255,255,.015);
    }
    .skill-group summary{
      list-style:none;
      cursor:pointer;
      padding:11px 12px;
      font-weight:700;
      color:#e9d7b0;
      background:rgba(255,255,255,.025);
      border-bottom:1px solid rgba(195,167,108,.08);
    }
    .skill-group[open] summary{border-bottom:1px solid rgba(195,167,108,.08)}
    .skill-group summary::-webkit-details-marker{display:none}
    .skill-group-body{padding:10px; display:grid; gap:8px}

    .skill-row, .weapon-row{
      display:grid;
      grid-template-columns: minmax(170px, 1.5fr) 72px 72px 72px 44px;
      gap:8px;
      align-items:center;
    }
    .weapon-row{
      grid-template-columns: minmax(140px,1.2fr) 80px 60px 60px 60px 44px;
    }
    .skill-row .name{
      display:flex;
      gap:8px;
      align-items:center;
      min-width:0;
    }
    .skill-label{
      font-size:14px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .base-badge{
      font-size:11px;
      color:var(--muted);
      border:1px solid rgba(195,167,108,.1);
      border-radius:999px;
      padding:2px 7px;
      background:rgba(255,255,255,.02);
      flex:none;
    }
    .mini{
      padding:8px 8px;
      text-align:center;
      min-width:0;
    }
    .roll-btn{
      padding:8px 0;
      border-radius:10px;
      border:1px solid rgba(195,167,108,.18);
      background:linear-gradient(180deg, #463824, #352b1d);
    }

    .tag{
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-size:12px;
      border-radius:999px;
      padding:5px 9px;
      border:1px solid rgba(195,167,108,.12);
      background:rgba(255,255,255,.03);
      color:var(--muted);
    }

    .muted{color:var(--muted)}
    .small{font-size:12px}

    .footer-note{
      padding:12px 16px;
      border-top:1px solid rgba(195,167,108,.12);
      color:var(--muted);
      font-size:12px;
      letter-spacing:.02em;
      background:linear-gradient(180deg, transparent, rgba(0,0,0,.15));
    }

    .divider{
      height:1px;
      background:rgba(195,167,108,.12);
      margin:10px 0;
    }

    .top-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .switch{
      display:flex;
      gap:10px;
      align-items:center;
      padding:8px 10px;
      border:1px solid rgba(195,167,108,.12);
      border-radius:12px;
      background:rgba(255,255,255,.02);
    }
    .switch label{
      font-size:12px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.08em;
    }
    .switch select{width:auto; padding:8px 10px}

    .toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      background:rgba(21,18,13,.92);
      border:1px solid rgba(195,167,108,.25);
      border-radius:12px;
      padding:10px 12px;
      color:var(--text);
      font-size:13px;
      box-shadow:var(--shadow);
      opacity:0;
      pointer-events:none;
      transition:.25s ease;
      z-index:50;
    }
    .toast.show{opacity:1; transform:translateX(-50%) translateY(-4px)}

    dialog{
      border:none;
      border-radius:16px;
      padding:0;
      background:linear-gradient(180deg, #231e17, #191510);
      color:var(--text);
      width:min(780px, 92vw);
      box-shadow:var(--shadow);
      border:1px solid rgba(195,167,108,.18);
    }
    dialog::backdrop{background:rgba(0,0,0,.62)}
    .dlg-head{
      padding:14px 16px;
      border-bottom:1px solid rgba(195,167,108,.12);
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
    }
    .dlg-head strong{
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--accent);
      font-size:13px;
    }
    .dlg-body{padding:14px 16px; display:grid; gap:12px}
    .dlg-foot{
      padding:12px 16px;
      border-top:1px solid rgba(195,167,108,.12);
      display:flex;
      justify-content:flex-end;
      gap:8px;
    }

    .roll-result{
      display:flex;
      gap:14px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
      border:1px solid rgba(195,167,108,.12);
      border-radius:14px;
      padding:12px;
      background:rgba(255,255,255,.02);
    }
    .roll-big{
      font-size:44px;
      font-weight:800;
      letter-spacing:.04em;
      color:#f4e6c7;
    }
    .result-badge{
      border-radius:999px;
      padding:6px 10px;
      border:1px solid rgba(195,167,108,.15);
      font-size:12px;
      letter-spacing:.08em;
      text-transform:uppercase;
      background:rgba(255,255,255,.03);
      color:var(--muted);
    }
    .res-regular{border-color:rgba(176,143,87,.5); color:#e8d3a7}
    .res-hard{border-color:rgba(138,111,68,.55); color:#e2c79a}
    .res-extreme{border-color:rgba(105,80,45,.6); color:#d8bd8e}
    .res-critical{border-color:rgba(99,138,88,.6); color:#cfe6c9}
    .res-fail{border-color:rgba(168,83,71,.5); color:#f0c7c2}
    .res-fumble{border-color:rgba(168,83,71,.75); color:#ffd2cc}

    .hidden{display:none !important}

    .print-hint{
      font-size:12px;
      color:var(--muted);
      line-height:1.4;
    }

    @media (max-width: 980px){
      body{overflow:auto}
      .app{grid-template-columns: 1fr; height:auto; min-height:100vh}
      .sidebar{position:sticky; top:0; z-index:20}
      .view-root{padding:12px}
      .grid-view{grid-template-columns: 1fr}
      .portrait-panel{grid-template-columns:1fr}
      .portrait-preview{width:100%;max-width:260px}
    }

    @media print{
      body{background:#fff; color:#000; overflow:visible}
      .sidebar,.toolbar,.toast,dialog{display:none !important}
      .app{grid-template-columns: 1fr}
      .view-root{padding:0}
      .sheet-card{box-shadow:none; border:1px solid #000}
      input,textarea,select{border:1px solid #000; color:#000; background:#fff}
      .section{border:1px solid #000}
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>Arkham Ledger</h1>
        <div class="sub" id="brandSubtext">Fichas de Investigadores · CoC</div>
      </div>

      <div class="sidebar-controls">
        <div class="row">
          <button class="btn ok" id="newSheetBtn">Nova ficha</button>
          <button class="btn secondary" id="importBtn">Importar</button>
        </div>

        <div class="row">
          <button class="btn ghost" id="exportAllBtn">Backup JSON</button>
        </div>
      </div>

      <div class="search">
        <input id="sheetSearch" placeholder="Buscar ficha..." />
      </div>

      <div class="sheet-list" id="sheetList"></div>

      <div class="footer-note">
        <div class="print-hint">
          <span id="printHintText">
          Dica: exporte a ficha como JSON para compartilhar. Para imprimir, use o menu do navegador.
          </span>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="toolbar">
        <div class="top-actions">
          <span class="tag" id="selectedTag">Nenhuma ficha</span>
          <span class="tag" id="autosaveTag">Autosave</span>
          <span class="tag" id="statusTag">Pronto</span>
        </div>
        <div class="top-actions">
          <button class="btn secondary" id="duplicateBtn">Duplicar</button>
          <button class="btn ghost" id="exportBtn">Download JSON</button>
          <button class="btn danger" id="deleteBtn">Excluir</button>
          <select id="languageSelect" class="lang-select" aria-label="Language"></select>
        </div>
      </div>

      <div class="view-root" id="viewRoot"></div>
    </main>
  </div>

  <input id="importFile" type="file" accept="application/json" class="hidden" />

  <div class="toast" id="toast"></div>

  <script src="./src/vendor/supabase.umd.js"></script>
  <script type="module" src="./src/main.js"></script>

</body>
</html>
