<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arkham Ledger | Login</title>
  <style>
    :root{
      --bg:#120f0c;
      --bg2:#1d1712;
      --panel:#221c15;
      --line:#5d4d35;
      --text:#eadfc8;
      --muted:#b8a98b;
      --accent:#c3a76c;
      --ok:#638a58;
      --err:#a85347;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      font-family: Georgia, "Times New Roman", serif;
      color:var(--text);
      background:linear-gradient(180deg, var(--bg), var(--bg2));
      padding:24px;
    }
    .card{
      width:min(520px,100%);
      border:1px solid rgba(195,167,108,.2);
      border-radius:16px;
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      overflow:hidden;
    }
    .head{padding:18px;border-bottom:1px solid rgba(195,167,108,.15)}
    h1{margin:0;font-size:24px;color:var(--accent)}
    .sub{margin-top:6px;font-size:13px;color:var(--muted)}
    .tabs{display:flex;gap:8px;padding:14px;border-bottom:1px solid rgba(195,167,108,.12)}
    .tabs button{
      flex:1;
      padding:10px;
      border:1px solid rgba(195,167,108,.2);
      border-radius:10px;
      background:#2c251c;
      color:var(--text);
      cursor:pointer;
    }
    .tabs button.active{background:#3b3022}
    .body{padding:16px;display:grid;gap:14px}
    .field{display:grid;gap:6px}
    label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
    input{
      width:100%;
      padding:10px;
      border-radius:10px;
      border:1px solid rgba(195,167,108,.2);
      background:#181511;
      color:var(--text);
      font:inherit;
    }
    .btn{
      width:100%;
      border:1px solid rgba(195,167,108,.2);
      border-radius:10px;
      padding:10px;
      color:var(--text);
      background:linear-gradient(180deg,#3b3022,#2e261c);
      cursor:pointer;
      font:inherit;
    }
    .message{
      min-height:20px;
      font-size:13px;
      border-radius:10px;
      padding:10px;
      border:1px solid transparent;
      color:var(--muted);
      background:rgba(255,255,255,.02);
    }
    .message.success{color:#d5e7cf;border-color:rgba(99,138,88,.35)}
    .message.error{color:#f1cdc8;border-color:rgba(168,83,71,.35)}
    .hidden{display:none}
  </style>
</head>
<body>
  <main class="card">
    <header class="head">
      <h1>Arkham Ledger</h1>
      <div class="sub">Autenticacao por email e senha</div>
    </header>

    <div class="tabs">
      <button id="loginTab" type="button" class="active">Entrar</button>
      <button id="signupTab" type="button">Criar conta</button>
    </div>

    <section class="body">
      <div id="authMessage" class="message"></div>

      <form id="loginForm">
        <div class="field">
          <label for="loginEmail">Email</label>
          <input id="loginEmail" type="email" required />
        </div>
        <div class="field">
          <label for="loginPassword">Senha</label>
          <input id="loginPassword" type="password" required />
        </div>
        <button class="btn" type="submit">Entrar</button>
      </form>

      <form id="signupForm" class="hidden">
        <div class="field">
          <label for="signupName">Nome (opcional)</label>
          <input id="signupName" type="text" />
        </div>
        <div class="field">
          <label for="signupEmail">Email</label>
          <input id="signupEmail" type="email" required />
        </div>
        <div class="field">
          <label for="signupPassword">Senha</label>
          <input id="signupPassword" type="password" required />
        </div>
        <div class="field">
          <label for="signupPasswordConfirm">Confirmar senha</label>
          <input id="signupPasswordConfirm" type="password" required />
        </div>
        <button class="btn" type="submit">Criar conta</button>
      </form>
    </section>
  </main>

  <script src="./env.js"></script>
  <script src="./src/vendor/supabase.umd.js"></script>
  <script type="module" src="./src/login.js"></script>
</body>
</html>
